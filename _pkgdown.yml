url: https://belian-earth.github.io/cptkirk/
development:
  mode: auto
template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: '#74ac90ff'
navbar:
  structure:
    left:
    - reference
    - intro
    - articles
    - news
    right:
    - search
    - github
  components:
    github:
      icon: fa-github
      href: https://github.com/belian-earth/cptkirk
reference:
- title: Warping
  desc: |
    Stream, mosaic and reproject/resample remote (Cloud-Optimised) GeoTIFFs onto a target grid, following the gdalwarp argument interface.
  contents:
  - ck_warp
  - warp_remote
  - ck_read
- title: Stacking & batch
  desc: |
    Drive many sources through one saturating pool: stack sources as separate bands of one output, or reproject/resample a whole list of groups (e.g. a STAC item list, one group per acquisition) in a single streaming fetch.
  contents:
  - ck_stack
  - ck_stack_read
  - ck_batch
- title: Inspection
  desc: |
    Read a source's structure and georeferencing, or open it once and reuse the handle across calls.
  contents:
  - cog_info
  - as.data.frame.cog_info
  - cog_source

